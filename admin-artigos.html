<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="author" content="Larissa Ember">

  <title>Admin — Artigos · The Last Epiphany</title>

  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" href="images/jujusamaaa.png" sizes="192x192">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">

  <link href="./css/product.css" rel="stylesheet">

  <style>
    body {
      background-color: rgb(40, 40, 40);
      color: #f0f0f0;
    }

    main {
      background-color: rgb(51, 51, 51);
      padding: 20px;
      border-radius: 10px;
      min-width: 280px;
      margin: auto;
    }

    .card-admin {
      background-color: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
    }

    .card-admin .card-header {
      background-color: #222;
      border-bottom: 1px solid #444;
      color: rgb(108, 224, 195);
      font-weight: 600;
    }

    .form-label {
      color: #ccc;
      font-size: 0.9rem;
    }

    .form-control,
    .form-select {
      background-color: #1a1a1a;
      border: 1px solid #555;
      color: #f0f0f0;
    }

    .form-control:focus,
    .form-select:focus {
      background-color: #1a1a1a;
      border-color: rgb(108, 224, 195);
      color: #f0f0f0;
      box-shadow: 0 0 0 0.2rem rgba(108, 224, 195, 0.25);
    }

    .form-control::placeholder {
      color: #666;
    }

    .btn-primary-custom {
      background-color: rgb(108, 224, 195);
      border: none;
      color: #1a1a1a;
      font-weight: 600;
    }

    .btn-primary-custom:hover {
      background-color: paleturquoise;
      color: #1a1a1a;
    }

    .btn-primary-custom:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .artigo-lista-item {
      background-color: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .artigo-lista-item .info-titulo {
      font-size: 1rem;
      color: #f0f0f0;
      font-weight: 500;
    }

    .artigo-lista-item .info-meta {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .artigo-lista-item .badge-categoria {
      background-color: rgba(108, 224, 195, 0.15);
      color: rgb(108, 224, 195);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.75rem;
    }

    .badge-rascunho {
      background-color: rgba(255, 193, 7, 0.15);
      color: #ffc107;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.75rem;
    }

    .loading-spinner {
      border: 3px solid #444;
      border-top: 3px solid rgb(108, 224, 195);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #login-section { }
    #admin-section { display: none; }

    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
    }

    textarea.form-control {
      font-family: monospace;
      font-size: 0.9rem;
    }

    .form-check-input:checked {
      background-color: rgb(108, 224, 195);
      border-color: rgb(108, 224, 195);
    }

    .tags-input-help {
      font-size: 0.78rem;
      color: #888;
      margin-top: 3px;
    }

    .preview-imagem {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      display: none;
      margin-top: 0.5rem;
    }

    .secao-titulo {
      color: rgb(108, 224, 195);
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <header class="site-header sticky-top py-1">
    <nav class="container d-flex flex-column flex-md-row justify-content-between">
      <a class="py-2" href="index.html" aria-label="Product">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
          stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="d-block mx-auto" role="img"
          viewBox="0 0 24 24">
          <title>Product</title>
          <circle cx="12" cy="12" r="10" />
          <path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16L3.95 6.06M14.31 16H2.83m13.79-4l-5.74 9.94" />
        </svg>
      </a>
      <a class="py-2 d-none d-md-inline-block" href="index.html">home</a>
      <a class="py-2 d-none d-md-inline-block" href="artigos.html">Artigos</a>
      <a class="py-2 d-none d-md-inline-block" href="comicas.html">Crônicas</a>
      <a class="py-2 d-none d-md-inline-block" href="profile.html">Contato</a>
    </nav>
  </header>

  <!-- Toast de notificações -->
  <div class="toast-container">
    <div id="toast-msg" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive">
      <div class="d-flex">
        <div class="toast-body" id="toast-texto"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <main class="container py-4">

    <!-- Tela de Login -->
    <div id="login-section">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card-admin card">
            <div class="card-header">🔐 Acesso Administrativo</div>
            <div class="card-body p-4">
              <p class="text-muted mb-3" style="font-size:0.85rem;">Entre com sua conta Back4App para acessar o painel de artigos.</p>
              <div class="mb-3">
                <label for="usuario-input" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="usuario-input" placeholder="seu usuário"
                  onkeydown="if(event.key==='Enter') entrar()">
              </div>
              <div class="mb-3">
                <label for="senha-input" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha-input" placeholder="••••••••"
                  onkeydown="if(event.key==='Enter') entrar()">
              </div>
              <button class="btn btn-primary-custom w-100" id="btn-login" onclick="entrar()">Entrar</button>
              <div id="login-erro" class="mt-2 text-danger" style="font-size:0.85rem; display:none;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Painel Admin -->
    <div id="admin-section">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0" style="color: rgb(108, 224, 195);">Gerenciar Artigos</h2>
        <div>
          <a href="artigos.html" class="btn btn-outline-light btn-sm me-2">Ver site</a>
          <button class="btn btn-outline-secondary btn-sm" onclick="sair()">Sair</button>
        </div>
      </div>

      <div class="row">

        <!-- Formulário de novo/editar artigo -->
        <div class="col-md-6 mb-4">
          <div class="card-admin card">
            <div class="card-header" id="form-titulo-header">✏️ Novo Artigo</div>
            <div class="card-body p-4">

              <input type="hidden" id="artigo-id">

              <div class="mb-3">
                <label for="campo-titulo" class="form-label">Título *</label>
                <input type="text" class="form-control" id="campo-titulo" placeholder="Título do artigo">
              </div>

              <div class="mb-3">
                <label for="campo-subtitulo" class="form-label">Subtítulo / Resumo</label>
                <input type="text" class="form-control" id="campo-subtitulo" placeholder="Breve descrição do artigo">
              </div>

              <div class="row mb-3">
                <div class="col">
                  <label for="campo-categoria" class="form-label">Categoria</label>
                  <input type="text" class="form-control" id="campo-categoria" placeholder="ex: Programação"
                    list="categorias-sugestoes">
                  <datalist id="categorias-sugestoes"></datalist>
                </div>
                <div class="col">
                  <label for="campo-autor" class="form-label">Autor</label>
                  <input type="text" class="form-control" id="campo-autor" placeholder="Larissa Ember" value="Larissa Ember">
                </div>
              </div>

              <div class="mb-3">
                <label for="campo-data" class="form-label">Data de publicação</label>
                <input type="date" class="form-control" id="campo-data">
              </div>

              <div class="mb-3">
                <label for="campo-imagem" class="form-label">URL da imagem</label>
                <input type="url" class="form-control" id="campo-imagem" placeholder="https://..."
                  oninput="previewImagem()">
                <img id="imagem-preview" class="preview-imagem" alt="Preview">
              </div>

              <div class="mb-3">
                <label for="campo-tags" class="form-label">Tags</label>
                <input type="text" class="form-control" id="campo-tags" placeholder="javascript, css, web">
                <div class="tags-input-help">Separe as tags por vírgula</div>
              </div>

              <div class="mb-3">
                <label for="campo-conteudo" class="form-label">Conteúdo (HTML)</label>
                <textarea class="form-control" id="campo-conteudo" rows="12"
                  placeholder="<p>Escreva o conteúdo do artigo aqui...</p>&#10;<h2>Subtítulo</h2>&#10;<p>Mais conteúdo...</p>"></textarea>
                <div class="tags-input-help">Suporta HTML: &lt;p&gt;, &lt;h2&gt;, &lt;strong&gt;, &lt;code&gt;, &lt;pre&gt;, &lt;blockquote&gt;, &lt;img&gt;, &lt;a&gt;, etc.</div>
              </div>

              <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="campo-publicado" checked>
                <label class="form-check-label" for="campo-publicado" style="color:#ccc;">Publicar imediatamente</label>
              </div>

              <div class="d-flex gap-2">
                <button class="btn btn-primary-custom flex-grow-1" id="btn-salvar" onclick="salvarArtigo()">
                  Salvar Artigo
                </button>
                <button class="btn btn-outline-secondary" id="btn-cancelar-edicao" onclick="cancelarEdicao()" style="display:none;">
                  Cancelar
                </button>
              </div>

              <div id="form-feedback" class="mt-3" style="display:none;"></div>

            </div>
          </div>
        </div>

        <!-- Lista de artigos existentes -->
        <div class="col-md-6">
          <div class="card-admin card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span>📋 Artigos Existentes</span>
              <button class="btn btn-sm btn-outline-light" onclick="carregarListaArtigos()">↺ Atualizar</button>
            </div>
            <div class="card-body p-3">
              <div id="lista-artigos-admin">
                <div class="text-center py-3">
                  <div class="loading-spinner"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
    crossorigin="anonymous"></script>

  <script src="https://cdn.back4app.com/libs/parse/2.8.4/parse.min.js"></script>
  <script>
    Parse.initialize("5YfqtpvHcsmbZ6xMJdi44NtBDDRubXz8cxPy5cbc", "PUbi70m8VLyjXnavTPA3B4fmplgho4F4vBZjyImd");
    Parse.serverURL = "https://parseapi.back4app.com/";

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function mostrarToast(msg, tipo) {
      const el = document.getElementById('toast-msg');
      const texto = document.getElementById('toast-texto');
      texto.textContent = msg;
      el.className = `toast align-items-center text-white border-0 bg-${tipo === 'erro' ? 'danger' : 'success'}`;
      const t = new bootstrap.Toast(el, { delay: 3500 });
      t.show();
    }

    async function entrar() {
      const usuario = document.getElementById('usuario-input').value.trim();
      const senha = document.getElementById('senha-input').value;
      const erroEl = document.getElementById('login-erro');
      const btn = document.getElementById('btn-login');

      if (!usuario || !senha) {
        erroEl.textContent = 'Preencha usuário e senha.';
        erroEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      erroEl.style.display = 'none';

      try {
        await Parse.User.logIn(usuario, senha);
        mostrarPainel();
      } catch (error) {
        erroEl.textContent = 'Usuário ou senha incorretos.';
        erroEl.style.display = 'block';
        document.getElementById('senha-input').value = '';
        document.getElementById('senha-input').focus();
      }

      btn.disabled = false;
      btn.textContent = 'Entrar';
    }

    function mostrarPainel() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').style.display = 'block';
      carregarListaArtigos();
      definirDataHoje();
    }

    async function sair() {
      await Parse.User.logOut();
      document.getElementById('admin-section').style.display = 'none';
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('usuario-input').value = '';
      document.getElementById('senha-input').value = '';
    }

    function definirDataHoje() {
      const hoje = new Date().toISOString().split('T')[0];
      document.getElementById('campo-data').value = hoje;
    }

    function previewImagem() {
      const url = document.getElementById('campo-imagem').value;
      const preview = document.getElementById('imagem-preview');
      if (url) {
        preview.src = url;
        preview.style.display = 'block';
        preview.onerror = () => { preview.style.display = 'none'; };
      } else {
        preview.style.display = 'none';
      }
    }

    function limparFormulario() {
      document.getElementById('artigo-id').value = '';
      document.getElementById('campo-titulo').value = '';
      document.getElementById('campo-subtitulo').value = '';
      document.getElementById('campo-categoria').value = '';
      document.getElementById('campo-autor').value = 'Larissa Ember';
      document.getElementById('campo-tags').value = '';
      document.getElementById('campo-conteudo').value = '';
      document.getElementById('campo-imagem').value = '';
      document.getElementById('campo-publicado').checked = true;
      document.getElementById('imagem-preview').style.display = 'none';
      document.getElementById('form-feedback').style.display = 'none';
      document.getElementById('form-titulo-header').textContent = '✏️ Novo Artigo';
      document.getElementById('btn-salvar').textContent = 'Salvar Artigo';
      document.getElementById('btn-cancelar-edicao').style.display = 'none';
      definirDataHoje();
    }

    function cancelarEdicao() {
      limparFormulario();
    }

    async function salvarArtigo() {
      const titulo = document.getElementById('campo-titulo').value.trim();
      if (!titulo) {
        mostrarFeedback('O título é obrigatório.', 'danger');
        return;
      }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="width:18px;height:18px;border-width:2px;"></span> Salvando...';

      try {
        const Artigo = Parse.Object.extend('Artigo');
        const id = document.getElementById('artigo-id').value;
        let artigo;

        if (id) {
          const query = new Parse.Query(Artigo);
          artigo = await query.get(id);
        } else {
          artigo = new Artigo();
        }

        const tagsStr = document.getElementById('campo-tags').value;
        const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t.length > 0);

        const dataStr = document.getElementById('campo-data').value;
        const dataObj = dataStr ? new Date(dataStr + 'T12:00:00') : new Date();

        artigo.set('titulo', titulo);
        artigo.set('subtitulo', document.getElementById('campo-subtitulo').value.trim());
        artigo.set('categoria', document.getElementById('campo-categoria').value.trim());
        artigo.set('autor', document.getElementById('campo-autor').value.trim() || 'Larissa Ember');
        artigo.set('conteudo', document.getElementById('campo-conteudo').value.trim());
        artigo.set('imagem', document.getElementById('campo-imagem').value.trim());
        artigo.set('tags', tags);
        artigo.set('data', dataObj);
        artigo.set('publicado', document.getElementById('campo-publicado').checked);

        const salvo = await artigo.save();

        mostrarToast(id ? 'Artigo atualizado com sucesso!' : 'Artigo criado com sucesso!', 'sucesso');
        limparFormulario();
        carregarListaArtigos();

      } catch (error) {
        mostrarFeedback('Erro ao salvar: ' + error.message, 'danger');
      }

      btn.disabled = false;
      btn.textContent = 'Salvar Artigo';
    }

    function mostrarFeedback(msg, tipo) {
      const el = document.getElementById('form-feedback');
      el.className = `alert alert-${tipo}`;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    async function carregarListaArtigos() {
      const lista = document.getElementById('lista-artigos-admin');
      lista.innerHTML = '<div class="text-center py-3"><div class="loading-spinner"></div></div>';

      try {
        const Artigo = Parse.Object.extend('Artigo');
        const query = new Parse.Query(Artigo);
        query.descending('data');
        query.limit(100);
        const artigos = await query.find();

        // Preencher sugestões de categorias
        const cats = [...new Set(artigos.map(a => a.get('categoria')).filter(Boolean))];
        document.getElementById('categorias-sugestoes').innerHTML = cats.map(c => `<option value="${c}">`).join('');

        if (artigos.length === 0) {
          lista.innerHTML = '<p class="text-muted text-center py-3" style="font-size:0.9rem;">Nenhum artigo ainda. Crie o primeiro!</p>';
          return;
        }

        lista.innerHTML = artigos.map(a => {
          const titulo = escapeHtml(a.get('titulo') || 'Sem título');
          const cat = escapeHtml(a.get('categoria') || '');
          const pub = a.get('publicado');
          const data = a.get('data') || a.createdAt;
          const dataStr = new Date(data).toLocaleDateString('pt-BR');

          return `
            <div class="artigo-lista-item">
              <div class="flex-grow-1">
                <div class="info-titulo">${titulo}</div>
                <div class="info-meta d-flex gap-2 align-items-center mt-1 flex-wrap">
                  ${cat ? `<span class="badge-categoria">${cat}</span>` : ''}
                  ${pub ? '' : '<span class="badge-rascunho">Rascunho</span>'}
                  <span>${dataStr}</span>
                </div>
              </div>
              <div class="d-flex flex-column gap-1 flex-shrink-0">
                <button class="btn btn-sm btn-outline-light" style="font-size:0.75rem;" onclick="editarArtigo('${escapeHtml(a.id)}')">Editar</button>
                <a href="artigo.html?id=${escapeHtml(a.id)}" target="_blank" class="btn btn-sm btn-outline-secondary" style="font-size:0.75rem;">Ver</a>
                <button class="btn btn-sm btn-outline-danger" style="font-size:0.75rem;" onclick="excluirArtigo('${escapeHtml(a.id)}')">Excluir</button>
              </div>
            </div>`;
        }).join('');

      } catch (error) {
        lista.innerHTML = `<p class="text-danger text-center py-3">Erro ao carregar: ${error.message}</p>`;
      }
    }

    async function editarArtigo(id) {
      try {
        const Artigo = Parse.Object.extend('Artigo');
        const query = new Parse.Query(Artigo);
        const artigo = await query.get(id);

        document.getElementById('artigo-id').value = id;
        document.getElementById('campo-titulo').value = artigo.get('titulo') || '';
        document.getElementById('campo-subtitulo').value = artigo.get('subtitulo') || '';
        document.getElementById('campo-categoria').value = artigo.get('categoria') || '';
        document.getElementById('campo-autor').value = artigo.get('autor') || 'Larissa Ember';
        document.getElementById('campo-conteudo').value = artigo.get('conteudo') || '';
        document.getElementById('campo-imagem').value = artigo.get('imagem') || '';
        document.getElementById('campo-tags').value = (artigo.get('tags') || []).join(', ');
        document.getElementById('campo-publicado').checked = !!artigo.get('publicado');

        const data = artigo.get('data') || artigo.createdAt;
        document.getElementById('campo-data').value = new Date(data).toISOString().split('T')[0];

        previewImagem();

        document.getElementById('form-titulo-header').textContent = '✏️ Editando Artigo';
        document.getElementById('btn-salvar').textContent = 'Atualizar Artigo';
        document.getElementById('btn-cancelar-edicao').style.display = 'inline-block';

        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        mostrarToast('Erro ao carregar artigo: ' + error.message, 'erro');
      }
    }

    async function excluirArtigo(id) {
      const titulo = document.querySelector(`[onclick="editarArtigo('${id}')"]`)?.closest('.artigo-lista-item')?.querySelector('.info-titulo')?.textContent || 'este artigo';
      if (!confirm(`Tem certeza que deseja excluir "${titulo}"? Esta ação não pode ser desfeita.`)) return;

      try {
        const Artigo = Parse.Object.extend('Artigo');
        const query = new Parse.Query(Artigo);
        const artigo = await query.get(id);
        await artigo.destroy();
        mostrarToast('Artigo excluído.', 'sucesso');
        carregarListaArtigos();
      } catch (error) {
        mostrarToast('Erro ao excluir: ' + error.message, 'erro');
      }
    }

    // Verificar se já está autenticado via Parse session
    if (Parse.User.current()) {
      mostrarPainel();
    }
  </script>

</body>

</html>
